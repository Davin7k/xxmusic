        // 渲染歌曲列表
        function renderSongs() {
            const songList = document.getElementById('songList');
            let html = '';
            
            songs.forEach(song => {
                html += `
                    <div class="song-card">
                        <div class="song-name">🎵 ${song.name}</div>
                        <div class="song-info">
                            <div class="info-item"><span class="info-label">演唱</span> ${song.singer}</div>
                            <div class="info-item"><span class="info-label">作曲</span> ${song.composer}</div>
                            <div class="info-item"><span class="info-label">作词</span> ${song.lyricist}</div>
                        </div>
                        <div class="platform-tag">📱 ${song.platform}</div>
                        <a href="${song.url}" target="_blank" class="play-btn">▶ 播放歌曲</a>
                    </div>
                `;
            });
            
            songList.innerHTML = html;
        }

        // 页面加载时渲染
        renderSongs();
